<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NASA Space Explorer</title>
  <link href="style.css" rel="stylesheet" type="text/css" />
</head>
<body>
  <main class="container" role="main">
    <header class="site-header">
      <img src="img/nasa-worm-logo.png" alt="NASA logo" class="logo" />
      <h1>Space Explorer</h1>
    </header>

    <section class="filters" aria-label="Select APOD date range">
      <div class="field-group">
        <label for="startDate" class="sr-only">Start date</label>
        <input type="date" id="startDate" aria-label="Start date" />
      </div>
      <div class="field-group">
        <label for="endDate" class="sr-only">End date</label>
        <input type="date" id="endDate" aria-label="End date" />
      </div>
      <button type="button" aria-label="Get space images">Get Space Images</button>
    </section>

    <section id="gallery" class="gallery" aria-label="Astronomy Picture of the Day gallery" aria-live="polite">
      <div class="placeholder">
        <div class="placeholder-icon" aria-hidden="true">🔭</div>
        <p>Select a date range and click "Get Space Images" to explore the cosmos!</p>
      </div>
    </section>
  </main>

  <script src="js/dateRange.js"></script>
  <script src="js/script.js"></script>
</body>
</html>
